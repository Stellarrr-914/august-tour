<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/global.css">
<title>Menu Admin</title>

</head>

<body>

<div class="main-container">
    <header class="menu-header">
        <h1>PANEL KONTROL</h1>
        <p>Manajemen Turnamen Agustusan</p>
    </header>

    <div class="menu-grid">
        <div class="menu-card card-blue" onclick="location.href='database.html'">
            <div class="card-icon">📁</div>
            <div class="card-info">
                <h3>Update Database</h3>
                <p>Tambah peserta & kelola daftar lomba</p>
            </div>
        </div>

        <div class="menu-card card-green" onclick="location.href='bracket.html'">
            <div class="card-icon">🌿</div>
            <div class="card-info">
                <h3>Bracket / Heat</h3>
                <p>Atur pertandingan & input hasil pemenang</p>
            </div>
        </div>

        <div class="menu-card card-red" onclick="window.open('live.html', '_blank')">
            <div class="card-icon">📢</div>
            <div class="card-info">
                <h3>Buka Live Report</h3>
                <p>Lihat tampilan publik (Halaman TV)</p>
            </div>
        </div>
    </div>

    <button id="logoutBtn" onclick="logout()" class="btn-logout">🚪 Keluar dari Sistem</button>
</div>

<script src="js/data.js"></script>
<script src="js/lomba.js"></script>
<script src="js/bracket.js"></script>
<script src="js/auth.js"></script>
<script src="js/navigation.js"></script>
<script src="js/main.js"></script>

</body>
</html>
