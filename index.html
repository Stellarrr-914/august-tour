<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/admin-style.css">
<title>Lomba RT Agustusan - Login</title>

</head>

<body class="myut-style-body">

  <div class="myut-page-container">
    
    <div class="myut-left-side">
      <div class="myut-form-content">
        
        <div class="myut-brand-section">
          <div class="myut-logo">🏆</div>
          <div class="myut-brand-text">
            <h2>TURNAMEN AGUSTUSAN</h2>
            <p>RT 01 / RW 01 - Portal Admin</p>
          </div>
        </div>

        <div class="myut-welcome-text">
          <h1>Selamat datang di</h1>
          <span class="myut-app-title">Admin<span class="highlight">Panel</span></span>
        </div>

        <div class="myut-input-box">
          <input type="text" id="username" placeholder="Masukkan Username">
          <input type="password" id="password" placeholder="Masukkan Password">
          
          <button onclick="login()" class="myut-btn-submit">MASUK KE DASHBOARD</button>
          
          <p id="loginError" style="color:#ff7675; font-size: 13px; margin-top: 15px; text-align: left;"></p>
        </div>

        <div class="myut-divider"></div>

        <div class="myut-footer-links">
          <div class="myut-link-item" onclick="window.location.href='live.html'" style="cursor: pointer;">
              <span>📢 Buka Live Report (Publik)</span>
          </div>
        </div>

      </div>
    </div>

    <div class="myut-right-side">
      <div class="myut-image-overlay"></div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/peserta.js"></script>
  <script src="js/lomba.js"></script>
  <script src="js/bracket.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
