<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #007bff;
            --success: #2ecc71;
            --warning: #f39c12;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        /* Layout Kolom Babak */
        #liveReportContainer {
    display: grid;
    /* Ini bikin kolom otomatis: minimal 300px, maksimal ngisi sisa layar */
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
    gap: 20px;
    align-items: start;
}

.lomba-card {
    background: #fff;
    border: 2px solid #007bff;
    border-radius: 10px;
    margin-bottom: 25px;
    overflow: hidden;
}

.lomba-header {
    background: #007bff;
    color: white;
    padding: 10px;
    font-weight: bold;
    text-align: center;
    text-transform: uppercase;
    font-size: 1.1rem;
}

.heat-wrapper {
    padding: 10px;
    border-bottom: 1px dashed #ccc;
}

.heat-wrapper:last-child { border-bottom: none; }

.heat-label {
    font-size: 0.85rem;
    font-weight: bold;
    color: #666;
    margin-bottom: 5px;
}

.babak-title {
    background: #333;
    color: #fff;
    padding: 10px;
    border-radius: 5px;
    text-align: center;
}
        /* Baris Peserta */
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .player-row:last-child { border-bottom: none; }

        .player-name { font-weight: 600; font-size: 0.95rem; }

        /* Badge Status */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-lose { 
    background: #e74c3c; 
    color: white; 
    padding: 2px 8px; 
    border-radius: 4px; 
    font-size: 10px; 
        .badge-next { background: var(--success); color: white; }
        .badge-wait { background: #6c757d; color: white; }
        .badge-win { background: gold; color: black; border: 1px solid #b8860b; }

        @media (max-width: 600px) {
            #liveReportContainer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 Live Report Tournament</h1>
        <h1 id="live-title">Memuat Data...</h1>
        <div id="liveReportContainer"></div>
        </div>
    </div>

    <div class="nav-menu">
    <button onclick="showRekapJuara()" class="btn-nav">🏆 Rekap Juara</button>
    <button onclick="window.close()" class="btn-nav btn-exit">🚪 Keluar</button>
</div>

<div id="rekapModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🏆 HALL OF FAME - DAFTAR JUARA</h2>
            <button onclick="closeRekapJuara()" class="btn-close">×</button>
        </div>
        <div id="rekapList" class="modal-body">
            </div>
    </div>
</div>

    <script src="js/live.js"></script>

</body>
</html>
