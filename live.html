<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Report Turnamen 🏆</title>
    <style>
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow-x: auto; }
    .bracket-container { display: flex; gap: 20px; padding: 20px; min-width: 800px; }
    .column { flex: 1; background: #1e1e1e; border-radius: 10px; padding: 10px; min-width: 250px; border: 1px solid #333; }
    .column-title { text-align: center; color: #ffc107; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
    .node { background: #2d2d2d; margin-bottom: 8px; padding: 10px; border-radius: 6px; font-size: 13px; display: flex; justify-content: space-between; border-left: 4px solid #555; }
    .node.lolos { border-left-color: #28a745; background: #243429; }
    .node.juara { border-left-color: #d4af37; background: #3a321a; font-weight: bold; }
    
    /* Pojok Kanan Atas: Next Match */
    .next-match-float { position: fixed; top: 10px; right: 10px; background: #e74c3c; padding: 10px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100; font-size: 12px; max-width: 150px; }
</style>

<div class="next-match-float" id="next-info">
    <div style="font-weight: bold; font-size: 10px;">NEXT LOMBA:</div>
    <div id="next-text">Memuat...</div>
</div>

<h2 style="text-align:center; color:#eee;">🏆 PROGRESS BRACKET</h2>
<div id="lomba-aktif" style="text-align:center; font-size:14px; color:#888; margin-bottom:20px;">Memuat data lomba...</div>

<div class="bracket-container">
    <div class="column">
        <div class="column-title">PENYISIHAN</div>
        <div id="col-penyisihan"></div>
    </div>
    <div class="column">
        <div class="column-title">SEMIFINAL</div>
        <div id="col-semifinal"></div>
    </div>
    <div class="column">
        <div class="column-title">FINAL & JUARA</div>
        <div id="col-final"></div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbw5EWepU1dOm8oC4ScjBIaGaiprcZhtOkRwxJA2CyS_X-Ah0DHjhaWW8fBHD3KfdhDh/exec";

    function updateLive() {
        fetch(`${scriptURL}?type=getLiveReportFull`)
        .then(res => res.json())
        .then(data => {
            const rekap = data.rekap; // Ini data dari Sheet 3
            const jadwal = data.jadwal; // Ini data dari Sheet 4
            
            // Bersihkan kolom
            document.getElementById("col-penyisihan").innerHTML = "";
            document.getElementById("col-semifinal").innerHTML = "";
            document.getElementById("col-final").innerHTML = "";

            if(rekap.length > 0) {
                document.getElementById("lomba-aktif").innerText = `${rekap[0].lomba} - ${rekap[0].kat}`;
                
                rekap.forEach(p => {
                    let html = `<div class="node ${p.status.toLowerCase().includes('lolos') ? 'lolos' : ''} ${p.status.toLowerCase().includes('juara') ? 'juara' : ''}">
                                    <span>${p.nama}</span>
                                    <small style="color:#aaa;">${p.status.split(' - ')[0]}</small>
                                </div>`;
                    
                    // Masukkan ke kolom yang sesuai
                    if (p.status.includes("Penyisihan")) {
                        document.getElementById("col-penyisihan").innerHTML += html;
                    } else if (p.status.includes("Semifinal")) {
                        document.getElementById("col-semifinal").innerHTML += html;
                    } else if (p.status.includes("Final")) {
                        document.getElementById("col-final").innerHTML += html;
                    }
                });

                // Update Next Match (Pojok Kanan)
                let currentLomba = rekap[0].lomba;
                let currentKat = rekap[0].kat;
                let idx = jadwal.findIndex(j => j.lomba === currentLomba && j.kat === currentKat);
                let next = jadwal[idx + 1];
                document.getElementById("next-text").innerText = next ? `${next.lomba} (${next.kat})` : "Selesai!";
            }
        });
    }

    setInterval(updateLive, 15000);
    updateLive();
</script>
</body>
</html>
