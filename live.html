<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Report Tournament 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --success: #2ecc71;
            --warning: #f39c12;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        /* Layout Kolom Babak */
        #liveReportContainer {
    display: grid;
    /* Ini bikin kolom otomatis: minimal 300px, maksimal ngisi sisa layar */
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
    gap: 20px;
    align-items: start;
}

.babak-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

        .babak-section h2 {
            text-align: center;
            font-size: 1.2rem;
            background: var(--dark);
            color: white;
            padding: 8px;
            border-radius: 5px;
            margin-top: 0;
        }

        /* Card per Heat */
        .heat-card {
            background: white;
            border-left: 5px solid var(--primary);
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .heat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
        }

        /* Baris Peserta */
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .player-row:last-child { border-bottom: none; }

        .player-name { font-weight: 600; font-size: 0.95rem; }

        /* Badge Status */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-next { background: var(--success); color: white; }
        .badge-wait { background: #6c757d; color: white; }
        .badge-win { background: gold; color: black; border: 1px solid #b8860b; }

        @media (max-width: 600px) {
            #liveReportContainer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 Live Report Tournament</h1>
        
        <div id="liveReportContainer">
            <div style="text-align: center; width: 100%; padding: 50px;">
                <p>Menghubungkan ke server cloud...</p>
            </div>
        </div>
    </div>

    <script src="js/live.js"></script>

</body>
</html>
