<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Report Turnamen</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #ffd700; --text: #eee; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Banner Next Match */
        .next-info { position: fixed; top: 10px; right: 10px; background: #c0392b; padding: 10px; border-radius: 8px; font-size: 11px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-left: 4px solid #fff; }

        .header { text-align: center; margin-bottom: 30px; }
        .bracket-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 40px; }
        
        .column { min-width: 280px; flex: 1; }
        .column-header { background: var(--card); padding: 12px; border-radius: 8px; text-align: center; color: var(--accent); font-weight: bold; border: 1px solid #333; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .match-card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .player-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #252525; font-size: 14px; }
        .player-row:last-child { border: none; }

        .badge-win { color: #2ecc71; font-weight: bold; font-size: 10px; border: 1px solid #2ecc71; padding: 1px 6px; border-radius: 4px; }
        
        ::-webkit-scrollbar { height: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="next-info">
        <div style="opacity: 0.7;">NEXT MATCH:</div>
        <div id="next-match-text">Memuat...</div>
    </div>

    <div class="header">
        <h2 id="lomba-aktif" style="margin:0; letter-spacing: 1px;">MEMUAT DATA...</h2>
        <p style="font-size: 12px; color: #666; margin-top: 5px;">Data diperbarui otomatis tiap 15 detik</p>
    </div>

    <div class="bracket-container" id="bracket-root">
        </div>

    <script src="js/live.js"></script>
</body>
</html>
