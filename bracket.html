<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bracket Lomba</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>

    <div class="admin-container">
        <header class="main-header">
            <h2 class="page-title">🌿 BRACKET & HEAT MANAGER</h2>
            <button onclick="location.href='menu.html'" class="btn-back">⬅️ Menu Utama</button>
        </header>

        <div class="card card-accent">
            <h3 class="card-title">🎯 Pilih Pertandingan</h3>
            <div class="filter-grid">
                <select id="lombaSelect" onchange="updateKategoriBerdasarkanLomba()">
                    <option value="">-- Pilih Lomba --</option>
                </select>

                <select id="kategoriSelect">
                    <option value="">-- Pilih Kategori --</option>
                </select>

                <select id="babakSelect">
                    <option value="Penyisihan">Penyisihan</option>
                    <option value="Semifinal">Semifinal</option>
                    <option value="Final">Final</option>
                </select>
            </div>
            <button onclick="tampilkanPesertaBracket()" class="btn-primary btn-full">
                🔍 Tampilkan Daftar Peserta
            </button>
        </div>

        <div id="pesertaLomba" class="grid-peserta"></div>

        <div id="actionGenerate" class="card card-action" style="display:none;">
            <div class="action-wrapper">
                <div class="input-setting">
                    <label>Peserta per Heat:</label>
                    <input type="number" id="limitPerHeat" value="4">
                </div>
                <div class="button-group">
                    <button onclick="generateBracket()" class="btn-success">⚡ Generate Heat</button>
                    <button id="btnPublikasi" onclick="publikasikanHeat()" class="btn-warning" style="display: none;">📢 Publikasikan ke Live</button>
                </div>
            </div>
        </div>

        <div id="hasilBracket" class="heat-grid-container"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/peserta.js"></script>
    <script src="js/lomba.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
