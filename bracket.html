<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Lomba</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .form-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; cursor: pointer; border: none; }
        button:hover { background: #218838; }
        #pesertaLomba { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .peserta-item { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .heat-container { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 20px; }
        .heat-box { border: 2px solid #333; border-radius: 8px; min-width: 200px; }
        .heat-header { background: #333; color: #fff; padding: 5px 10px; font-weight: bold; text-align: center; }
        .heat-list { list-style: none; padding: 10px; margin: 0; }
        .heat-list li { padding: 5px 0; border-bottom: 1px solid #eee; }
        .heat-list li:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <h2>Bracket / Heat Generator</h2>
    
    <div class="form-section">
        <button onclick="location.href='menu.html'">← Kembali ke Menu</button>
        <hr>
        
        <label><strong>1. Pilih Lomba:</strong></label><br>
        <select id="lombaSelect" onchange="updateKategoriBerdasarkanLomba()" style="width: 100%;">
            <option value="">-- Pilih Lomba --</option>
        </select>

        <br><br>

        <label><strong>2. Pilih Kategori:</strong></label><br>
        <select id="kategoriSelect" style="width: 100%;">
            <option value="">-- Pilih Lomba Dulu --</option>
        </select>

        <br><br>

        <button onclick="tampilkanPesertaBracket()">Tampilkan Daftar Peserta</button>
    </div>

    <div id="loadingData" style="display:none; color: blue; font-weight: bold;">
        Sedang memproses data...
    </div>

    <div id="pesertaLomba"></div>

    <br>
    <div id="actionGenerate" style="display:none;">
        <hr>
        <label>Peserta per Heat:</label>
        <input type="number" id="limitPerHeat" value="4" style="width: 50px; padding: 5px;">
        <button onclick="generateBracket()" style="background: #007bff;">Generate Heat Otomatis</button>
    </div>

    <div id="hasilBracket" class="heat-container"></div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/peserta.js"></script>
    <script src="js/lomba.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
