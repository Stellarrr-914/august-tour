<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Lomba</title>
    <link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/admin-style.css">
</head>
<body>

    <h2>Bracket / Heat Generator</h2>
    
    <div class="form-section">
        <button onclick="location.href='menu.html'">← Kembali ke Menu</button>
        <hr>
        
        <label><strong>1. Pilih Lomba:</strong></label><br>
        <select id="lombaSelect" onchange="updateKategoriBerdasarkanLomba()" style="width: 100%;">
            <option value="">-- Pilih Lomba --</option>
        </select>

        <br><br>

        <label><strong>2. Pilih Kategori:</strong></label><br>
        <select id="kategoriSelect" style="width: 100%;">
            <option value="">-- Pilih Lomba Dulu --</option>
        </select>

        <select id="babakSelect" onchange="tampilkanPesertaBracket()">
            <option value="Penyisihan">Penyisihan</option>
            <option value="Semifinal">Semifinal</option>
            <option value="Final">Final</option>
        </select>

        <br><br>

        <button onclick="tampilkanPesertaBracket()">Tampilkan Daftar Peserta</button>
    </div>

    <div id="loadingData" style="display:none; color: blue; font-weight: bold;">
        Sedang memproses data...
    </div>

    <div id="pesertaLomba"></div>

    <br>
    <div id="actionGenerate" style="display:none;">
        <hr>
        <label>Peserta per Heat:</label>
        <input type="number" id="limitPerHeat" value="4" style="width: 50px; padding: 5px;">
        <button onclick="generateBracket()" style="background: #007bff;">Generate Heat Otomatis</button>
        <button id="btnPublikasi" onclick="publikasikanHeat()" style="background: #f39c12; color: white; display: none; margin-top: 10px;">
    📢 Publikasikan Ke Live Report
</button>
    </div>



    <div id="hasilBracket" class="heat-container"></div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/peserta.js"></script>
    <script src="js/lomba.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
